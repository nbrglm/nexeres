basePath: /
definitions:
  admin.AdminCreateDomainRequest:
    properties:
      autoJoin:
        type: boolean
      autoJoinRoleId:
        type: string
      autoJoinRoleName:
        type: string
      domain:
        type: string
    required:
    - domain
    type: object
  admin.AdminCreateDomainResponse:
    properties:
      domain:
        $ref: '#/definitions/db.OrgDomain'
      message:
        type: string
      success:
        type: boolean
    type: object
  admin.AdminCreateRoleRequest:
    properties:
      description:
        type: string
      name:
        type: string
      permissions:
        items:
          type: string
        type: array
    required:
    - name
    - permissions
    type: object
  admin.AdminCreateRoleResponse:
    properties:
      message:
        type: string
      role:
        $ref: '#/definitions/db.Role'
      success:
        type: boolean
    type: object
  admin.AdminDeleteDomainResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
    type: object
  admin.AdminDeleteRoleResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
    type: object
  admin.AdminGetDomainVerifyCodeResponse:
    properties:
      code:
        type: string
      message:
        type: string
      success:
        type: boolean
    type: object
  admin.AdminUpdateDomainRequest:
    properties:
      autoJoin:
        type: boolean
      autoJoinRoleId:
        type: string
      autoJoinRoleName:
        type: string
    type: object
  admin.AdminUpdateDomainResponse:
    properties:
      domain:
        $ref: '#/definitions/db.OrgDomain'
      message:
        type: string
      success:
        type: boolean
    type: object
  admin.AdminUpdateOrgRequest:
    properties:
      description:
        type: string
      name:
        type: string
      settings:
        $ref: '#/definitions/models.OrgSettings'
    required:
    - name
    - settings
    type: object
  admin.AdminUpdateOrgResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
    type: object
  admin.AdminUpdateRoleRequest:
    properties:
      description:
        type: string
      name:
        type: string
      permissions:
        items:
          type: string
        type: array
    required:
    - name
    - permissions
    type: object
  admin.AdminUpdateRoleResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
    type: object
  admin.AdminVerifyDomainResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
      verified:
        type: boolean
    type: object
  cache.FlowData:
    properties:
      createdAt:
        type: string
      email:
        type: string
      expiresAt:
        type: string
      id:
        type: string
      mfaRequired:
        type: boolean
      mfaVerified:
        type: boolean
      orgs:
        items:
          $ref: '#/definitions/db.Org'
        type: array
      returnTo:
        description: URL to redirect after flow completion
        type: string
      type:
        type: string
      userId:
        type: string
    type: object
  config.APIKeyConfig:
    properties:
      description:
        description: Description of the key
        type: string
      name:
        description: The name of the API Key
        type: string
    required:
    - description
    - name
    type: object
  config.AuditLogsConfig:
    properties:
      enable:
        description: Enable or disable audit logs.
        type: boolean
    type: object
  config.BrandingConfig:
    properties:
      appName:
        description: AppName is the name of the application, used in various places
          like email templates, UI, etc.
        type: string
      companyName:
        description: CompanyName is the name of the company, used in emails, UI, etc.
        type: string
      companyNameShort:
        description: CompanyNameShort is a short version of the company name, used
          in places where space is limited.
        type: string
      supportURL:
        description: SupportURL is the URL for support, used in emails, UI, etc.
        type: string
    required:
    - appName
    - companyName
    - companyNameShort
    - supportURL
    type: object
  config.CompleteConfig:
    properties:
      branding:
        $ref: '#/definitions/config.BrandingConfig'
      debug:
        description: Debug mode for the application
        type: boolean
      jwt:
        $ref: '#/definitions/config.JWTConfig'
      multitenancy:
        type: boolean
      notifications:
        $ref: '#/definitions/config.NotificationsConfig'
      public:
        $ref: '#/definitions/config.PublicConfig'
      security:
        $ref: '#/definitions/config.SecurityConfig'
    required:
    - branding
    - jwt
    - multitenancy
    - notifications
    - public
    - security
    type: object
  config.EmailEndpointsConfig:
    properties:
      passwordReset:
        description: |-
          PasswordReset is the endpoint for the password reset link.
          A `token` parameter will be passed to this URL.
          Pass a full url, eg. https://auth.example.com/password-reset
        type: string
      verificationEmail:
        description: |-
          VerificationEmail is the endpoint for the email verification link.
          A `token` parameter will be passed to this URL.
          Pass a full url, eg. https://auth.example.com/verify-email
        type: string
    required:
    - passwordReset
    - verificationEmail
    type: object
  config.EmailNotificationConfig:
    properties:
      endpoints:
        allOf:
        - $ref: '#/definitions/config.EmailEndpointsConfig'
        description: Endpoints holds the configuration for URLs inside emails.
      provider:
        description: Provider is the email provider to use for sending emails.
        enum:
        - ses
        - sendgrid
        - smtp
        type: string
    required:
    - endpoints
    - provider
    type: object
  config.JWTConfig:
    properties:
      refreshTokenExpiration:
        description: 'Refresh token expiration time in seconds (default: 30d, 2592000)'
        minimum: 86400
        type: integer
      sessionTokenExpiration:
        description: 'Session token expiration time in seconds (default: 1hr, 3600)'
        minimum: 60
        type: integer
    required:
    - refreshTokenExpiration
    - sessionTokenExpiration
    type: object
  config.NotificationsConfig:
    properties:
      email:
        allOf:
        - $ref: '#/definitions/config.EmailNotificationConfig'
        description: Email configuration for sending notifications
      sms:
        allOf:
        - $ref: '#/definitions/config.SMSNotificationConfig'
        description: SMS Configuration for sending notifications
    required:
    - email
    type: object
  config.PublicConfig:
    properties:
      debugBaseURL:
        type: string
      domain:
        description: |-
          Domain is the domain at which Nexeres UI is being hosted.

          Eg. if hosting Nexeres at auth.example.com, provide "example.com" here.

          This setting is used as the Domain for all Cookies (except Refresh Token Cookie, that is only set at "subdomain.domain")
        type: string
      scheme:
        description: |-
          Scheme for public URLs (http/https)

          Use "https" even if TLS termination is handled by reverse proxy
        enum:
        - http
        - https
        type: string
      subDomain:
        description: |-
          Subdomain at which Nexeres UI is being hosted.

          Eg. If hosting Nexeres at auth.example.com, provide "auth" here.
        type: string
    required:
    - domain
    - scheme
    - subDomain
    type: object
  config.RateLimitConfig:
    properties:
      rate:
        description: |-
          Rate limit for API requests.
          Format: "R-U", where R is requests and U is the time unit (s - per second, m - per minute, h - per hour, d - per day)
        type: string
    required:
    - rate
    type: object
  config.SMSNotificationConfig:
    properties:
      provider:
        description: 'TODO: Implement SMSNotificationConfig'
        enum:
        - twilio
        type: string
    required:
    - provider
    type: object
  config.SecurityConfig:
    properties:
      apiKeys:
        description: |-
          The list of API Keys which are allowed to access the API endpoints.
          Requests without an API key, or with a key not specified here, will be denied with 401.
        items:
          $ref: '#/definitions/config.APIKeyConfig'
        type: array
      auditLogs:
        allOf:
        - $ref: '#/definitions/config.AuditLogsConfig'
        description: Enable or disable audit logs.
      rateLimit:
        allOf:
        - $ref: '#/definitions/config.RateLimitConfig'
        description: Rate limiting configuration.
    required:
    - apiKeys
    - auditLogs
    - rateLimit
    type: object
  db.GetMinimalRolesForOrgRow:
    properties:
      createdAt:
        type: string
      id:
        type: string
      roleDesc:
        type: string
      roleName:
        type: string
      updatedAt:
        type: string
    type: object
  db.Org:
    properties:
      avatarUrl:
        type: string
      createdAt:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      settings:
        $ref: '#/definitions/models.OrgSettings'
      slug:
        type: string
      updatedAt:
        type: string
    type: object
  db.OrgDomain:
    properties:
      autoJoin:
        type: boolean
      autoJoinRoleId:
        type: string
      autoJoinRoleName:
        type: string
      createdAt:
        type: string
      domain:
        type: string
      orgId:
        type: string
      updatedAt:
        type: string
      verified:
        type: boolean
      verifiedAt:
        type: string
    type: object
  db.Role:
    properties:
      createdAt:
        type: string
      id:
        type: string
      orgId:
        type: string
      permissions:
        items:
          type: string
        type: array
      roleDesc:
        type: string
      roleName:
        type: string
      updatedAt:
        type: string
    type: object
  handlers.GetFlowResponse:
    properties:
      flow:
        $ref: '#/definitions/cache.FlowData'
      message:
        type: string
      success:
        type: boolean
    type: object
  handlers.LoginRequest:
    properties:
      email:
        type: string
      flowReturnTo:
        description: |-
          Optional field to store in the flow data which can be fetched by the client after login
          This can be used to redirect the user to a specific page after login
          or to maintain the state of the application.
          It is recommended to validate this field on the client side to prevent open redirect vulnerabilities.
        type: string
      password:
        type: string
      userAgent:
        type: string
      userIp:
        description: Metadata, required to issue tokens
        type: string
    required:
    - email
    - password
    - userIp
    type: object
  handlers.LoginResponse:
    properties:
      flowId:
        type: string
      message:
        type: string
      requireEmailVerification:
        type: boolean
      success:
        type: boolean
      tokens:
        $ref: '#/definitions/tokens.Tokens'
    type: object
  handlers.LogoutResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
    type: object
  handlers.RefreshTokenRequest:
    properties:
      userAgent:
        type: string
      userIp:
        type: string
    required:
    - userIp
    type: object
  handlers.RefreshTokenResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
      tokens:
        $ref: '#/definitions/tokens.Tokens'
    type: object
  handlers.SendVerifyEmailRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  handlers.SendVerifyEmailResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
    type: object
  handlers.SignupRequest:
    properties:
      confirmPassword:
        type: string
      email:
        type: string
      inviteToken:
        description: Optional invite token for multitenant signup
        type: string
      name:
        minLength: 2
        type: string
      password:
        maxLength: 32
        minLength: 8
        type: string
    required:
    - confirmPassword
    - email
    - name
    - password
    type: object
  handlers.SignupResponse:
    properties:
      backupCodes:
        items:
          $ref: '#/definitions/models.BackupCode'
        type: array
      message:
        type: string
      success:
        type: boolean
      userId:
        type: string
    type: object
  handlers.VerifyEmailTokenRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  handlers.VerifyEmailTokenResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
    type: object
  models.BackupCode:
    properties:
      code:
        type: string
      used:
        type: boolean
    type: object
  models.OrgMFASettings:
    properties:
      required:
        type: boolean
      roles:
        additionalProperties:
          type: string
        description: role name to role-id mapping
        type: object
    type: object
  models.OrgSettings:
    properties:
      mfa:
        $ref: '#/definitions/models.OrgMFASettings'
    type: object
  reserr.ErrorResponse:
    properties:
      debug:
        description: DebugMessage is a technical message that can be used for debugging.
        type: string
      message:
        description: Message is a user-friendly message that can be displayed to the
          end user.
        type: string
    type: object
  resquery.FilterMode:
    enum:
    - AND
    - OR
    type: string
    x-enum-varnames:
    - FilterModeAND
    - FilterModeOR
  resquery.FilterOption:
    properties:
      field:
        type: string
      op:
        $ref: '#/definitions/resquery.QueryFilterOp'
      value: {}
    type: object
  resquery.QueryFilterOp:
    enum:
    - contains
    - equals
    - lte
    - gte
    - lt
    - gt
    type: string
    x-enum-varnames:
    - OpContains
    - OpEquals
    - OpLte
    - OpGte
    - OpLt
    - OpGt
  resquery.QueryFilters:
    properties:
      mode:
        $ref: '#/definitions/resquery.FilterMode'
      options:
        items:
          $ref: '#/definitions/resquery.FilterOption'
        minItems: 1
        type: array
    required:
    - mode
    - options
    type: object
  resquery.QueryPagination:
    properties:
      page:
        description: Page is the page number to retrieve (0-based).
        minimum: 0
        type: integer
      pageSize:
        maximum: 100
        minimum: 1
        type: integer
    required:
    - page
    - pageSize
    type: object
  resquery.SortOption:
    properties:
      direction:
        enum:
        - asc
        - desc
        - ASC
        - DESC
        type: string
      field:
        type: string
    required:
    - direction
    - field
    type: object
  sys_admin.SysAdminCreateOrgRequest:
    properties:
      avatarURL:
        type: string
      description:
        type: string
      name:
        type: string
      settings:
        $ref: '#/definitions/models.OrgSettings'
      slug:
        type: string
    required:
    - name
    - settings
    - slug
    type: object
  sys_admin.SysAdminCreateOrgResponse:
    properties:
      message:
        type: string
      orgId:
        type: string
      success:
        type: boolean
    type: object
  sys_admin.SysAdminDeleteOrgResponse:
    properties:
      message:
        type: string
      success:
        type: boolean
    type: object
  sys_admin.SysAdminGetConfigResponse:
    properties:
      config:
        $ref: '#/definitions/config.CompleteConfig'
      message:
        type: string
      success:
        type: boolean
    type: object
  sys_admin.SysAdminGetOrgDetailsResponse:
    properties:
      domains:
        items:
          $ref: '#/definitions/db.OrgDomain'
        type: array
      message:
        type: string
      org:
        $ref: '#/definitions/db.Org'
      roles:
        items:
          $ref: '#/definitions/db.GetMinimalRolesForOrgRow'
        type: array
      success:
        type: boolean
    type: object
  sys_admin.SysAdminListOrgsRequest:
    properties:
      filters:
        $ref: '#/definitions/resquery.QueryFilters'
      pagination:
        $ref: '#/definitions/resquery.QueryPagination'
      sort:
        items:
          $ref: '#/definitions/resquery.SortOption'
        type: array
    required:
    - sort
    type: object
  sys_admin.SysAdminListOrgsResponse:
    properties:
      message:
        type: string
      orgs:
        description: List of organizations
        items:
          $ref: '#/definitions/db.Org'
        type: array
      pagination:
        allOf:
        - $ref: '#/definitions/resquery.QueryPagination'
        description: Pagination details, default if not provided in the request
      success:
        type: boolean
      total:
        description: Total number of organizations matching the filters (if any)
        type: integer
    type: object
  tokens.Tokens:
    properties:
      refreshToken:
        description: |-
          RefreshToken is the generated refresh token.

          This is base64.RawURLEncoding encoded.
          DO NOT DECODE IT WHILE RETRIEVING IT FROM THE COOKIES/CLIENT.
        type: string
      refreshTokenExpiry:
        description: RefreshTokenExpiry is the expiration time of the refresh token.
        type: string
      sessionId:
        description: SessionId is the unique identifier for the session.
        type: string
      sessionToken:
        description: |-
          SessionToken is the generated session token.

          This is a jwt which is base64.RawURLEncoding encoded.
          YOU NEED TO DECODE IT WHILE RETRIEVING IT FROM THE COOKIES/CLIENT.
          DO NOT USE IT AS IS. VALIDATION WILL FAIL WITHOUT DECODING.
          ONLY WHEN DECODED, YOU SHOULD PASS IT TO THE THINGS THAT REQUIRE THE SESSION TOKEN.
        type: string
      sessionTokenExpiry:
        description: SessionTokenExpiry is the expiration time of the session token.
        type: string
    type: object
externalDocs:
  description: NBRGLM Nexeres Documentation
  url: https://nbrglm.com/nexeres/docs
host: localhost:3360
info:
  contact:
    email: contact@nbrglm.com
    name: NBRGLM Support
    url: https://nbrglm.com/support
  description: This is the NBRGLM Nexeres API Spec documentation.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://nbrglm.com/nexeres/terms
  title: NBRGLM Nexeres API Spec
  version: 0.0.1
paths:
  /api/admin/orgs/:orgId/domains/:domain:
    post:
      consumes:
      - application/json
      description: Handles AdminUpdateDomain requests
      parameters:
      - description: Organization ID
        in: path
        name: orgId
        required: true
        type: string
      - description: Domain
        in: path
        name: domain
        required: true
        type: string
      - description: Request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.AdminUpdateDomainRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/admin.AdminUpdateDomainResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/reserr.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/reserr.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/reserr.ErrorResponse'
      summary: AdminUpdateDomain Endpoint
      tags:
      - admin
  /api/admin/orgs/{orgId}:
    post:
      consumes:
      - application/json
      description: Handles AdminUpdateOrg requests
      parameters:
      - description: Organization ID
        in: path
        name: orgId
        required: true
        type: string
      - description: Request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.AdminUpdateOrgRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/admin.AdminUpdateOrgResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/reserr.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/reserr.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/reserr.ErrorResponse'
      summary: AdminUpdateOrg Endpoint
      tags:
      - admin
  /api/admin/orgs/{orgId}/domains:
    put:
      consumes:
      - application/json
      description: Handles AdminCreateDomain requests
      parameters:
      - description: Organization ID
        in: path
        name: orgId
        required: true
        type: string
      - description: Request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.AdminCreateDomainRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/admin.AdminCreateDomainResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/reserr.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/reserr.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/reserr.ErrorResponse'
      summary: AdminCreateDomain Endpoint
      tags:
      - admin
  /api/admin/orgs/{orgId}/domains/{domain}:
    delete:
      consumes:
      - application/json
      description: Handles AdminDeleteDomain requests
      parameters:
      - description: Organization ID
        in: path
        name: orgId
        required: true
        type: string
      - description: Domain
        in: path
        name: domain
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/admin.AdminDeleteDomainResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/reserr.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/reserr.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/reserr.ErrorResponse'
      summary: AdminDeleteDomain Endpoint
      tags:
      - admin
  /api/admin/orgs/{orgId}/domains/{domain}/verify:
    post:
      consumes:
      - application/json
      description: Handles AdminVerifyDomain requests
      parameters:
      - description: Organization ID
        in: path
        name: orgId
        required: true
        type: string
      - description: Domain to verify
        in: path
        name: domain
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/admin.AdminVerifyDomainResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/reserr.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/reserr.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/reserr.ErrorResponse'
      summary: AdminVerifyDomain Endpoint
      tags:
      - admin
  /api/admin/orgs/{orgId}/domains/{domain}/verify/code:
    get:
      consumes:
      - application/json
      description: Handles AdminGetDomainVerifyCode requests
      parameters:
      - description: Organization ID
        in: path
        name: orgId
        required: true
        type: string
      - description: Domain
        in: path
        name: domain
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/admin.AdminGetDomainVerifyCodeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/reserr.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/reserr.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/reserr.ErrorResponse'
      summary: AdminGetDomainVerifyCode Endpoint
      tags:
      - admin
  /api/admin/orgs/{orgId}/roles:
    put:
      consumes:
      - application/json
      description: Handles CreateRole requests
      parameters:
      - description: Organization ID
        in: path
        name: orgId
        required: true
        type: string
      - description: Request body
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.AdminCreateRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/admin.AdminCreateRoleResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/reserr.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
